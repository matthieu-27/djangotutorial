{% extends "polls/base.html" %}

{% block title %}Add a question{% endblock %}

{% block content %}
<h1>Add a question</h1>

<form action="{% url 'polls:add' %}" method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <input type="submit" />
</form>
{% endblock %}
